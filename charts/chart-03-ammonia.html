<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ammonia: domestic production vs imports</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: #111827; font-family: 'Inter', -apple-system, sans-serif; padding: 16px; display: flex; flex-direction: column; }
  .chart-title { font-size: 13px; font-weight: 600; color: #d1d5db; margin-bottom: 2px; }
  .chart-sub   { font-size: 11px; color: #4b5563; margin-bottom: 8px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .legend span { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #6b7280; }
  .sw { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .chart-wrap { flex: 1; position: relative; min-height: 0; }
</style>
</head>
<body>
<div class="chart-title">Ammonia: domestic production vs imports</div>
<div class="chart-sub">Million tonnes per year, FY16–FY25</div>
<div class="legend">
  <span><span class="sw" style="background:#185FA5;"></span>Domestic production (implied)</span>
  <span><span class="sw" style="background:#D85A30;"></span>Imports</span>
</div>
<div class="chart-wrap"><canvas id="c"></canvas></div>
<script>
'use strict';
var GRID = 'rgba(255,255,255,0.06)';
var TICK = '#6b7280';
var TT = { backgroundColor:'#1f2937', borderColor:'#374151', borderWidth:1, titleColor:'#d1d5db', bodyColor:'#9ca3af', footerColor:'#f3f4f6', footerFont:{weight:'600'}, mode:'index', intersect:false };
new Chart(document.getElementById('c'), {
  type:'bar',
  data:{ labels:['FY16','FY17','FY18','FY19','FY20','FY21','FY22','FY23','FY24','FY25'],
    datasets:[
      { label:'Domestic production', data:[14.2,14.4,14.8,15.0,14.8,14.9,15.1,15.5,16.0,16.5], backgroundColor:'#185FA5' },
      { label:'Imports',             data:[1.8,1.9,2.1,2.7,2.4,2.2,2.1,2.3,2.4,2.4],           backgroundColor:'#D85A30' }
    ]
  },
  options:{
    responsive:true, maintainAspectRatio:false, animation:{duration:400},
    plugins:{ legend:{display:false}, tooltip:{ ...TT, callbacks:{
      label:function(c){ return '  '+c.dataset.label+': '+c.parsed.y.toFixed(1)+' MT'; },
      footer:function(items){ return 'Total: '+items.reduce(function(a,i){ return a+i.parsed.y; },0).toFixed(1)+' MT'; }
    }}},
    scales:{
      x:{ grid:{color:GRID}, ticks:{color:TICK,font:{size:10},autoSkip:false,maxRotation:0} },
      y:{ grid:{color:GRID}, ticks:{color:TICK,font:{size:10}}, title:{display:true,text:'MT/yr',font:{size:10},color:TICK} }
    }
  }
});
</script>
</body>
</html>
